name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend-spring/**'
      - 'backend-fastapi/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # vision 첫 빌드는 PyTorch + CUDA 휠 ~3GB 다운로드/설치 + layer export로
          # 단독 ~7분 소요. 다른 서비스 빌드와 합치면 default 10m timeout을 초과한다.
          # 한 번 캐시되면 후속 CD는 1~2분이라 30m 마진은 첫 배포 보호용.
          command_timeout: 30m
          script: |
            set -e
            cd ~/nutriagentpjt
            echo "[cd] sync to origin/main"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "[cd] HEAD: $(git rev-parse --short HEAD) $(git log -1 --pretty=%s)"
            echo "[cd] preflight: ensure external network nutriagent-net exists"
            docker network inspect nutriagent-net >/dev/null 2>&1 || docker network create nutriagent-net
            echo "[cd] build spring (no-cache)"
            docker compose build --no-cache spring
            echo "[cd] build fastapi"
            docker compose build fastapi
            echo "[cd] build vision"
            docker compose build vision
            echo "[cd] build frontend"
            docker compose build frontend
            echo "[cd] up -d (force-recreate)"
            docker compose up -d --force-recreate
            echo "[cd] ps"
            docker compose ps
            echo "[cd] smoke: wait for /api/v1/chat/personas to return 200 (max 90s)"
            SMOKE_OK=0
            for i in $(seq 1 45); do
              if curl -fsS -o /dev/null -m 5 http://localhost/api/v1/chat/personas; then
                echo "[cd] smoke ok at attempt $i ($(date +%T))"
                SMOKE_OK=1
                break
              fi
              sleep 2
            done
            if [ "$SMOKE_OK" != "1" ]; then
              echo "[cd] smoke FAILED — dumping logs" >&2
              docker compose ps
              docker compose logs --tail=200 spring fastapi frontend vision vision-pg
              exit 1
            fi
            echo "[cd] smoke: SPA /"
            curl -fsS -o /dev/null http://localhost/
            echo "[cd] smoke: vision liveness (/health, 폴링 60회×2s = 최대 120s)"
            # /health 는 liveness(앱이 응답 가능한지)만 확인. /health/ready 는 DB+모델
            # 체크라 데이터 부트스트랩(scripts/init_db.py + load_*.py) 전에는 실패할 수 있다.
            # 이번 PR 범위는 컨테이너 기동까지 — readiness 검증은 부트스트랩 PR에서.
            # vision 부팅에 uvicorn + DINOv2 모델 로드(~330MB 첫 다운로드)가 포함돼
            # start_period 120s(Dockerfile)에 맞춰 폴링도 120s 까지 허용.
            VISION_LIVE_OK=0
            for i in $(seq 1 60); do
              if docker exec nutriagent-vision curl -fsS -o /dev/null -m 5 http://localhost:8000/health; then
                echo "[cd] vision liveness ok at attempt $i ($(date +%T))"
                VISION_LIVE_OK=1
                break
              fi
              sleep 2
            done
            if [ "$VISION_LIVE_OK" != "1" ]; then
              echo "[cd] vision liveness FAILED — dumping logs" >&2
              docker compose ps
              docker compose logs --tail=200 vision vision-pg
              exit 1
            fi
            echo "[cd] spring logs (tail 50)"
            docker compose logs --tail=50 spring || true
            echo "[cd] frontend logs (tail 20)"
            docker compose logs --tail=20 frontend || true
            docker image prune -f
