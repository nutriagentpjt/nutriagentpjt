name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend-spring/**'
      - 'backend-fastapi/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/nutriagentpjt
            echo "[cd] git pull"
            git pull origin main
            echo "[cd] HEAD: $(git rev-parse --short HEAD) $(git log -1 --pretty=%s)"
            echo "[cd] build spring (no-cache)"
            docker compose build --no-cache spring
            echo "[cd] build fastapi"
            docker compose build fastapi
            echo "[cd] up -d (force-recreate)"
            docker compose up -d --force-recreate
            echo "[cd] ps"
            docker compose ps
            echo "[cd] spring logs (tail 50)"
            docker compose logs --tail=50 spring || true
            docker image prune -f
