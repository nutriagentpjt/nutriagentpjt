version: '3.8'

services:
  fastapi:
    build:
      context: ./backend-fastapi
    container_name: nutriagent-fastapi
    environment:
      POSTGRES_SERVER: nutriagent-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SPRING_BASE_URL: http://nutriagent-spring:8080
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    expose:
      - "8000"
    networks:
      - nutriagent-net
    restart: unless-stopped

  spring:
    build:
      context: ./backend-spring
    container_name: nutriagent-spring
    environment:
      DB_URL: jdbc:postgresql://nutriagent-postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FASTAPI_BASE_URL: http://nutriagent-fastapi:8000
      FASTAPI_VISION_URL: http://nutriagent-vision:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    expose:
      - "8080"
    depends_on:
      fastapi:
        condition: service_started
    networks:
      - nutriagent-net
    restart: unless-stopped

  vision-pg:
    image: pgvector/pgvector:pg16
    container_name: nutriagent-vision-pg
    environment:
      POSTGRES_DB: ${VISION_PG_DB}
      POSTGRES_USER: ${VISION_PG_USER}
      POSTGRES_PASSWORD: ${VISION_PG_PASSWORD}
    volumes:
      - vision-pg-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VISION_PG_USER} -d ${VISION_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nutriagent-net
    restart: unless-stopped

  vision:
    build:
      context: ./backend-fastapi/vision
    container_name: nutriagent-vision
    environment:
      DATABASE_URL: postgresql://${VISION_PG_USER}:${VISION_PG_PASSWORD}@nutriagent-vision-pg:5432/${VISION_PG_DB}
      APP_ENV: ${VISION_APP_ENV:-dev}
      MODEL_DEVICE: ${VISION_MODEL_DEVICE:-cpu}
      MODEL_WEIGHTS_PATH: ${VISION_MODEL_WEIGHTS_PATH:-}
      VISION_WORKERS: ${VISION_WORKERS:-2}
    volumes:
      # 운영: EC2 호스트의 ~/nutriagentpjt/vision-data/ 에
      # merged_food_db_keyword_avg.csv, pgvector_rows.parquet 를 두고 마운트.
      # 부트스트랩은 별도 절차(docker compose exec vision python scripts/init_db.py ...)로 진행.
      - ./vision-data:/app/data
    expose:
      - "8000"
    depends_on:
      vision-pg:
        condition: service_healthy
    networks:
      - nutriagent-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: nutriagent-frontend
    ports:
      - "80:8080"
    depends_on:
      - spring
    networks:
      - nutriagent-net
    restart: unless-stopped

networks:
  nutriagent-net:
    name: nutriagent-net
    external: true

volumes:
  vision-pg-data:
    name: nutriagent-vision-pg-data
