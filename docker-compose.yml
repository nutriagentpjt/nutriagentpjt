version: '3.8'

services:
  fastapi:
    build:
      context: ./backend-fastapi
    container_name: nutriagent-fastapi
    environment:
      POSTGRES_SERVER: nutriagent-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SPRING_BASE_URL: http://nutriagent-spring:8080
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    expose:
      - "8000"
    networks:
      - nutriagent-net
    restart: unless-stopped

  spring:
    build:
      context: ./backend-spring
    container_name: nutriagent-spring
    environment:
      DB_URL: jdbc:postgresql://nutriagent-postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      FASTAPI_BASE_URL: http://nutriagent-fastapi:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    expose:
      - "8080"
    depends_on:
      fastapi:
        condition: service_started
    networks:
      - nutriagent-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: nutriagent-frontend
    ports:
      - "80:8080"
    depends_on:
      - spring
    networks:
      - nutriagent-net
    restart: unless-stopped

networks:
  nutriagent-net:
    name: nutriagent-net
    external: true
