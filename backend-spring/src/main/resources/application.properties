spring.application.name=Onboard

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/NutriAgent}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Note: Use 'validate' in production, 'update' in development
# Changed to 'none' to skip schema validation (DB created by FastAPI with NUMERIC types)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:db/migration

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# FastAPI Recommendation Service
fastapi.recommend.url=${FASTAPI_BASE_URL:http://localhost:8000}/api/v1/recommend
fastapi.internal-key=${INTERNAL_API_KEY:}
